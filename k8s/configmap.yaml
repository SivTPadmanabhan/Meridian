apiVersion: v1
kind: ConfigMap
metadata:
  name: meridian-config
  labels:
    app: meridian-backend
# Non-secret configuration only. Secrets (API keys, DATABASE_URL with password,
# Langfuse keys, webhook secrets) live in a separate Kubernetes Secret named
# `meridian-secrets` — never committed with values.
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  ANTHROPIC_TRIAGE_MODEL: "claude-haiku-4-5"
  ANTHROPIC_ANALYSIS_MODEL: "claude-sonnet-4-6"
  OPENAI_JUDGE_MODEL: "gpt-5.4-mini"
  TRIAGE_CONFIDENCE_ESCALATION: "0.6"
  EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  EMBEDDING_DIM: "384"
  REDIS_CACHE_TTL: "600"
  LANGFUSE_HOST: "http://langfuse-web:3000"
  CASSANDRA_AUDIT_ENABLED: "true"
  CASSANDRA_HOSTS: '["cassandra"]'
  CASSANDRA_PORT: "9042"
  CASSANDRA_KEYSPACE: "meridian_audit"
